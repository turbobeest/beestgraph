## beestgraph/docker/docker-compose.yml
## Core service: FalkorDB graph database
## Target platform: Raspberry Pi 5 (ARM64)

services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: beestgraph-falkordb
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "${FALKORDB_PORT:-6379}:6379"  # Redis/FalkorDB protocol
      - "3000:3000"                     # FalkorDB Browser UI
    volumes:
      - falkordb-data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 8g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  radicale:
    image: tomsquest/docker-radicale:latest
    container_name: beestgraph-radicale
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "5232:5232"
    volumes:
      - radicale-data:/data
    environment:
      - RADICALE_AUTH_TYPE=none  # Local network only, behind Tailscale
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5232/.web/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  falkordb-data:
    driver: local
  radicale-data:
    driver: local
