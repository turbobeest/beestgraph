<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>beestgraph — Topic Tree</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #101418; color: #c8ccd1;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; }

    /* ─── Nav ─── */
    nav { position: fixed; top: 0; left: 0; right: 0; height: 36px; display: flex;
      align-items: center; z-index: 150; background: rgba(6,10,19,0.95);
      border-bottom: 1px solid rgba(100,116,139,0.15); backdrop-filter: blur(12px); }
    nav .brand { padding: 0 16px; font-size: 13px; font-weight: 700; color: #f1f5f9;
      border-right: 1px solid rgba(100,116,139,0.15); height: 100%; display: flex; align-items: center; }
    nav a { padding: 0 14px; height: 100%; display: flex; align-items: center;
      color: #64748b; text-decoration: none; font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase; }
    nav a.active { color: #60a5fa; border-bottom: 2px solid #3b82f6; }
    nav a:hover { color: #94a3b8; }

    /* ─── Page ─── */
    .page { margin-top: 36px; padding: 20px 32px 80px; max-width: 900px; margin-left: auto; margin-right: auto; }

    /* ─── Header ─── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h1 { font-size: 22px; font-weight: 600; color: #e3e3e3; }
    .page-header .actions { display: flex; gap: 8px; }

    /* ─── Buttons ─── */
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px;
      border: 1px solid #2a2f36; border-radius: 4px; background: #1a1e24;
      color: #c8ccd1; font-size: 12px; font-family: inherit; cursor: pointer;
      transition: all 0.15s; }
    .btn:hover { background: #222830; border-color: #3a4149; }
    .btn.primary { background: #1e3a5f; border-color: #2563eb; color: #60a5fa; }
    .btn.primary:hover { background: #1e4a7f; }
    .btn.primary:disabled { opacity: 0.4; cursor: default; }
    .btn.danger { color: #f87171; }
    .btn.danger:hover { background: #2a1a1a; border-color: #991b1b; }
    .btn-sm { padding: 3px 8px; font-size: 11px; }

    /* ─── Status ─── */
    .status-bar { height: 24px; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .status-msg { font-size: 12px; color: #54606d; transition: color 0.3s; }
    .status-msg.success { color: #3fb950; }
    .status-msg.error { color: #f87171; }
    .status-msg.saving { color: #d29922; }

    /* ─── Tree structure ─── */
    .area-list { display: flex; flex-direction: column; gap: 16px; }

    .area { background: #1a1e24; border: 1px solid #2a2f36; border-radius: 6px; overflow: hidden; }
    .area.sortable-ghost { opacity: 0.4; }
    .area.sortable-chosen { box-shadow: 0 0 0 2px #3b82f6; }

    .area-header { display: flex; align-items: center; padding: 10px 14px;
      background: #14181d; border-bottom: 1px solid #2a2f36; gap: 8px; }
    .area-header .drag-handle { cursor: grab; color: #54606d; font-size: 14px; padding: 0 4px;
      user-select: none; display: flex; align-items: center; }
    .area-header .drag-handle:hover { color: #8b949e; }
    .area-header .drag-handle:active { cursor: grabbing; }
    .area-header .jd-num { font-size: 13px; font-weight: 700; color: #60a5fa;
      min-width: 28px; font-variant-numeric: tabular-nums; }
    .area-header .area-name { font-size: 14px; font-weight: 600; color: #e3e3e3; flex: 1;
      cursor: text; padding: 2px 4px; border-radius: 2px; border: 1px solid transparent; }
    .area-header .area-name:hover { border-color: #2a2f36; }
    .area-header .area-name:focus { outline: none; border-color: #3b82f6;
      background: #14181d; }
    .area-header .delete-btn { visibility: hidden; background: none; border: none;
      color: #54606d; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 2px; }
    .area-header:hover .delete-btn { visibility: visible; }
    .area-header .delete-btn:hover { color: #f87171; background: #2a1a1a; }

    .area-body { padding: 8px 12px 12px; }

    /* Category */
    .category-list { display: flex; flex-direction: column; gap: 6px; min-height: 4px; }

    .category { background: #1e2228; border: 1px solid #2a2f36; border-radius: 4px; }
    .category.sortable-ghost { opacity: 0.4; }
    .category.sortable-chosen { box-shadow: 0 0 0 2px #3b82f6; }

    .cat-header { display: flex; align-items: center; padding: 6px 10px; gap: 6px; }
    .cat-header .drag-handle { cursor: grab; color: #54606d; font-size: 12px; padding: 0 2px;
      user-select: none; display: flex; align-items: center; }
    .cat-header .drag-handle:hover { color: #8b949e; }
    .cat-header .drag-handle:active { cursor: grabbing; }
    .cat-header .jd-num { font-size: 12px; font-weight: 600; color: #60a5fa;
      min-width: 22px; font-variant-numeric: tabular-nums; }
    .cat-header .cat-name { font-size: 13px; font-weight: 500; color: #c8ccd1; flex: 1;
      cursor: text; padding: 1px 4px; border-radius: 2px; border: 1px solid transparent; }
    .cat-header .cat-name:hover { border-color: #2a2f36; }
    .cat-header .cat-name:focus { outline: none; border-color: #3b82f6; background: #14181d; }
    .cat-header .delete-btn { visibility: hidden; background: none; border: none;
      color: #54606d; cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 2px; }
    .cat-header:hover .delete-btn { visibility: visible; }
    .cat-header .delete-btn:hover { color: #f87171; background: #2a1a1a; }

    .cat-body { padding: 2px 10px 6px 38px; }

    /* Sub — recursive tree-style rows */
    .sub-list { display: flex; flex-direction: column; gap: 3px; min-height: 4px; }

    .sub-node { border-left: 1px solid #2a2f36; margin-left: 2px; }
    .sub-node.sortable-ghost { opacity: 0.4; }
    .sub-node.sortable-chosen { box-shadow: 0 0 0 2px #3b82f6; border-radius: 3px; }

    .sub-header { display: flex; align-items: center; gap: 5px; padding: 2px 6px; border-radius: 3px; }
    .sub-header:hover { background: rgba(255,255,255,0.02); }
    .sub-header .drag-handle { cursor: grab; color: #54606d; font-size: 11px; padding: 0 2px;
      user-select: none; display: flex; align-items: center; flex-shrink: 0; }
    .sub-header .drag-handle:hover { color: #8b949e; }
    .sub-header .drag-handle:active { cursor: grabbing; }
    .sub-header .jd-num { font-size: 11px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      color: #54606d; white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .sub-header .sub-name { font-size: 12px; color: #8b949e; flex: 1;
      cursor: text; padding: 1px 4px; border-radius: 2px; border: 1px solid transparent; }
    .sub-header .sub-name:hover { border-color: #2a2f36; color: #c8ccd1; }
    .sub-header .sub-name:focus { outline: none; border-color: #3b82f6; background: #1a1e24; color: #e3e3e3; }
    .sub-header .sub-actions { display: flex; align-items: center; gap: 2px; visibility: hidden; }
    .sub-header:hover .sub-actions { visibility: visible; }
    .sub-header .sub-actions button { background: none; border: none; cursor: pointer;
      font-size: 11px; padding: 1px 4px; border-radius: 2px; line-height: 1; }
    .sub-header .add-child-btn { color: #54606d; }
    .sub-header .add-child-btn:hover { color: #60a5fa; background: rgba(59,130,246,0.1); }
    .sub-header .delete-btn { color: #54606d; }
    .sub-header .delete-btn:hover { color: #f87171; background: #2a1a1a; }

    .sub-children { margin-left: 14px; }

    /* Add buttons */
    .add-row { display: flex; align-items: center; margin-top: 6px; }
    .add-btn { display: inline-flex; align-items: center; gap: 3px; padding: 3px 10px;
      background: none; border: 1px dashed #2a2f36; border-radius: 4px;
      color: #54606d; font-size: 11px; font-family: inherit; cursor: pointer;
      transition: all 0.15s; }
    .add-btn:hover { border-color: #3b82f6; color: #60a5fa; background: rgba(59,130,246,0.05); }

    .add-area-row { margin-top: 16px; display: flex; justify-content: center; }
    .add-area-btn { padding: 8px 20px; font-size: 12px; border-radius: 6px; }

    /* Drop zone highlight */
    .sortable-drag { z-index: 999; }
    .category-list.sortable-drag-over,
    .sub-list.sortable-drag-over { background: rgba(59,130,246,0.05);
      border-radius: 4px; }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #14181d; }
    ::-webkit-scrollbar-thumb { background: #2a2f36; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a4149; }

    /* ─── Editable input overlay ─── */
    .inline-input { background: #14181d; border: 1px solid #3b82f6; border-radius: 2px;
      color: #e3e3e3; font-family: inherit; padding: 1px 4px; outline: none; }
  </style>
</head>
<body>
  <nav>
    <div class="brand">beestgraph</div>
    <a href="/graph3d.html" target="_blank">3D Graph</a>
    <a href="/wiki.html" target="_blank">Wiki</a>
    <a href="/dashboard.html" target="_blank">Dashboard</a>
    <a href="/queue" target="_blank">Queue</a>
    <a href="/org.html" class="active" style="margin-left:auto;border-left:1px solid rgba(100,116,139,0.15)">Org</a>
    <a href="/audit.html" target="_blank" style="border-left:1px solid rgba(100,116,139,0.15);color:#f59e0b">Audit</a>
    <a href="/review.html" target="_blank" style="border-left:1px solid rgba(100,116,139,0.15);color:#10b981">Review</a>
    <a href="/wiki.html#help" target="_blank" style="border-left:1px solid rgba(100,116,139,0.15);color:#6b9edd">Help</a>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>Topic Tree Organization</h1>
      <div class="actions">
        <button class="btn" onclick="loadTree()" title="Reload from server">Reload</button>
        <button class="btn primary" id="save-btn" onclick="saveTree()" disabled>Save Changes</button>
      </div>
    </div>
    <div class="status-bar">
      <span class="status-msg" id="status-msg">Loading...</span>
    </div>
    <div class="area-list" id="area-list"></div>
    <div class="add-area-row">
      <button class="add-btn add-area-btn" onclick="addArea()">+ Area</button>
    </div>
  </div>

  <script>
    /* ─── State ─── */
    let tree = { areas: [] };
    let dirty = false;
    let sortableInstances = [];

    /* ─── Status feedback ─── */
    function setStatus(msg, cls) {
      const el = document.getElementById('status-msg');
      el.textContent = msg;
      el.className = 'status-msg' + (cls ? ' ' + cls : '');
    }

    function markDirty() {
      dirty = true;
      document.getElementById('save-btn').disabled = false;
      setStatus('Unsaved changes', '');
    }

    function markClean() {
      dirty = false;
      document.getElementById('save-btn').disabled = true;
    }

    /* ─── Load / Save ─── */
    async function loadTree() {
      try {
        setStatus('Loading...', '');
        const res = await fetch('/api/org');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        tree = await res.json();
        // Migrate flat string subs to object format if needed
        tree.areas.forEach(area => {
          area.categories.forEach(cat => {
            migrateSubs(cat, area.slug + '/' + slugify(cat.name));
          });
        });
        renderTree();
        markClean();
        setStatus('Loaded ' + tree.areas.length + ' areas', 'success');
      } catch (err) {
        setStatus('Load failed: ' + err.message, 'error');
      }
    }

    /* Migrate old flat string subs to object format */
    function migrateSubs(cat, parentSlug) {
      if (!cat.subs) { cat.subs = []; return; }
      if (cat.subs.length > 0 && typeof cat.subs[0] === 'string') {
        cat.subs = cat.subs.map((name, i) => ({
          id: i + 1,
          name: name,
          slug: parentSlug + '/' + slugify(name),
          subs: [],
        }));
      }
    }

    async function saveTree() {
      try {
        setStatus('Saving...', 'saving');
        document.getElementById('save-btn').disabled = true;
        syncTreeFromDOM();
        const res = await fetch('/api/org', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(tree),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'HTTP ' + res.status);
        }
        markClean();
        setStatus('Saved successfully', 'success');
      } catch (err) {
        setStatus('Save failed: ' + err.message, 'error');
        document.getElementById('save-btn').disabled = false;
      }
    }

    /* ─── Read current state from the DOM (after drag reorder) ─── */
    function syncTreeFromDOM() {
      const areaEls = document.querySelectorAll('#area-list > .area');
      const areas = [];
      let areaIdx = 0;
      areaEls.forEach(areaEl => {
        const areaId = (areaIdx + 1) * 10;
        const areaName = areaEl.querySelector('.area-name').textContent.trim();
        const areaSlug = slugify(areaName);
        const cats = [];
        let catIdx = 0;
        areaEl.querySelectorAll(':scope .category-list > .category').forEach(catEl => {
          const catId = areaId + catIdx + 1;
          const catName = catEl.querySelector(':scope > .cat-header .cat-name').textContent.trim();
          const catSlug = areaSlug + '/' + slugify(catName);
          const subs = syncSubsFromDOM(catEl.querySelector(':scope > .cat-body > .sub-list'), catSlug);
          cats.push({ id: catId, name: catName, slug: catSlug, subs: subs });
          catIdx++;
        });
        areas.push({ id: areaId, name: areaName, slug: areaSlug, categories: cats });
        areaIdx++;
      });
      tree.areas = areas;
    }

    /* Recursively read sub objects from DOM */
    function syncSubsFromDOM(subListEl, parentSlug) {
      if (!subListEl) return [];
      const subs = [];
      let idx = 0;
      subListEl.querySelectorAll(':scope > .sub-node').forEach(nodeEl => {
        idx++;
        const name = nodeEl.querySelector(':scope > .sub-header .sub-name').textContent.trim();
        const slug = parentSlug + '/' + slugify(name);
        const childList = nodeEl.querySelector(':scope > .sub-children > .sub-list');
        const childSubs = syncSubsFromDOM(childList, slug);
        subs.push({ id: idx, name: name, slug: slug, subs: childSubs });
      });
      return subs;
    }

    function slugify(s) {
      return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    /* ─── JD number helpers ─── */
    function padId(id) {
      return String(id).padStart(3, '0');
    }

    function jdNumber(catId, idChain) {
      if (idChain.length === 0) return String(catId);
      return catId + '.' + idChain.map(padId).join('.');
    }

    /* ─── Render ─── */
    function renderTree() {
      destroySortables();
      const container = document.getElementById('area-list');
      container.innerHTML = '';

      tree.areas.forEach((area, ai) => {
        const areaEl = document.createElement('div');
        areaEl.className = 'area';
        areaEl.dataset.slug = area.slug;
        areaEl.innerHTML = renderArea(area, ai);
        container.appendChild(areaEl);
      });

      initSortables();
    }

    function renderArea(area, areaIndex) {
      const areaId = area.id;
      let catsHtml = '';
      area.categories.forEach((cat, ci) => {
        catsHtml += renderCategory(cat, areaId, ci, area.slug);
      });

      return `
        <div class="area-header">
          <span class="drag-handle area-drag" title="Drag to reorder">&#9776;</span>
          <span class="jd-num">${areaId}</span>
          <span class="area-name" contenteditable="true" spellcheck="false"
                onblur="markDirty()" onkeydown="handleNameKey(event)">${escHtml(area.name)}</span>
          <button class="delete-btn" onclick="deleteArea(this)" title="Delete area">&times;</button>
        </div>
        <div class="area-body">
          <div class="category-list">${catsHtml}</div>
          <div class="add-row">
            <button class="add-btn" onclick="addCategory(this)">+ Category</button>
          </div>
        </div>`;
    }

    function renderCategory(cat, areaId, catIndex, areaSlug) {
      const catId = areaId + catIndex + 1;
      const subsHtml = renderSubList(cat.subs, catId, []);

      return `
        <div class="category" data-slug="${escAttr(cat.slug)}">
          <div class="cat-header">
            <span class="drag-handle cat-drag" title="Drag to reorder">&#9776;</span>
            <span class="jd-num">${catId}</span>
            <span class="cat-name" contenteditable="true" spellcheck="false"
                  onblur="markDirty()" onkeydown="handleNameKey(event)">${escHtml(cat.name)}</span>
            <button class="delete-btn" onclick="deleteCategory(this)" title="Delete category">&times;</button>
          </div>
          <div class="cat-body">
            ${subsHtml}
            <div class="add-row">
              <button class="add-btn" onclick="addSub(this)">+ Sub</button>
            </div>
          </div>
        </div>`;
    }

    /* Render a sub-list container with its children recursively */
    function renderSubList(subs, catId, parentIdChain) {
      let inner = '';
      subs.forEach((sub, i) => {
        inner += renderSubNode(sub, catId, parentIdChain);
      });
      const depth = parentIdChain.length;
      return `<div class="sub-list" data-depth="${depth}">${inner}</div>`;
    }

    /* Render a single sub node and its nested children */
    function renderSubNode(sub, catId, parentIdChain) {
      const idChain = parentIdChain.concat([sub.id]);
      const jd = jdNumber(catId, idChain);
      const childrenHtml = renderSubList(sub.subs || [], catId, idChain);

      return `
        <div class="sub-node">
          <div class="sub-header">
            <span class="drag-handle sub-drag" title="Drag to reorder">&#9776;</span>
            <span class="jd-num">${jd}</span>
            <span class="sub-name" contenteditable="true" spellcheck="false"
                  onblur="markDirty()" onkeydown="handleNameKey(event)">${escHtml(sub.name)}</span>
            <span class="sub-actions">
              <button class="add-child-btn" onclick="addChildSub(this)" title="Add child sub">+</button>
              <button class="delete-btn" onclick="deleteSub(this)" title="Remove">&times;</button>
            </span>
          </div>
          <div class="sub-children">
            ${childrenHtml}
          </div>
        </div>`;
    }

    /* ─── Escape helpers ─── */
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function escAttr(s) {
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ─── Keyboard for contenteditable ─── */
    function handleNameKey(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        e.target.blur();
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        e.target.blur();
      }
    }

    /* ─── Add items ─── */
    function addArea() {
      syncTreeFromDOM();
      const nextId = tree.areas.length > 0
        ? (Math.max(...tree.areas.map(a => a.id)) + 10)
        : 10;
      // Round up to next 10
      const id = Math.ceil(nextId / 10) * 10;
      tree.areas.push({
        id: id,
        name: 'New Area',
        slug: 'new-area',
        categories: [],
      });
      renderTree();
      markDirty();
      // Focus the new area name
      const areas = document.querySelectorAll('.area-name');
      const last = areas[areas.length - 1];
      if (last) {
        last.focus();
        selectAll(last);
      }
    }

    function addCategory(btn) {
      const areaBody = btn.closest('.area-body');
      const catList = areaBody.querySelector('.category-list');
      const areaEl = btn.closest('.area');
      const areaIndex = Array.from(document.querySelectorAll('#area-list > .area')).indexOf(areaEl);
      const existingCats = catList.querySelectorAll(':scope > .category').length;
      const areaId = (areaIndex + 1) * 10;
      const catId = areaId + existingCats + 1;
      const areaSlug = areaEl.dataset.slug || 'area';

      const catEl = document.createElement('div');
      catEl.className = 'category';
      catEl.dataset.slug = areaSlug + '/new-category';
      catEl.innerHTML = `
        <div class="cat-header">
          <span class="drag-handle cat-drag" title="Drag to reorder">&#9776;</span>
          <span class="jd-num">${catId}</span>
          <span class="cat-name" contenteditable="true" spellcheck="false"
                onblur="markDirty()" onkeydown="handleNameKey(event)">New Category</span>
          <button class="delete-btn" onclick="deleteCategory(this)" title="Delete category">&times;</button>
        </div>
        <div class="cat-body">
          <div class="sub-list" data-depth="0"></div>
          <div class="add-row">
            <button class="add-btn" onclick="addSub(this)">+ Sub</button>
          </div>
        </div>`;
      catList.appendChild(catEl);
      initSubSortable(catEl.querySelector('.sub-list'));
      markDirty();
      const nameEl = catEl.querySelector('.cat-name');
      nameEl.focus();
      selectAll(nameEl);
    }

    /* Add a top-level sub to a category */
    function addSub(btn) {
      const catBody = btn.closest('.cat-body');
      const subList = catBody.querySelector(':scope > .sub-list');
      const catEl = btn.closest('.category');
      const catId = getCatJdId(catEl);
      const existingCount = subList.querySelectorAll(':scope > .sub-node').length;
      const newId = existingCount + 1;
      const jd = catId + '.' + padId(newId);

      const nodeEl = createSubNodeEl('New Sub', jd);
      subList.appendChild(nodeEl);
      initSubSortable(nodeEl.querySelector('.sub-list'));
      markDirty();
      renumberAll();
      const nameEl = nodeEl.querySelector('.sub-name');
      nameEl.focus();
      selectAll(nameEl);
    }

    /* Add a child sub under an existing sub node */
    function addChildSub(btn) {
      const parentNode = btn.closest('.sub-node');
      const childContainer = parentNode.querySelector(':scope > .sub-children > .sub-list');
      const existingCount = childContainer.querySelectorAll(':scope > .sub-node').length;
      const newId = existingCount + 1;

      const nodeEl = createSubNodeEl('New Sub', '...'); // placeholder JD, renumber will fix
      childContainer.appendChild(nodeEl);
      initSubSortable(nodeEl.querySelector('.sub-list'));
      markDirty();
      renumberAll();
      const nameEl = nodeEl.querySelector('.sub-name');
      nameEl.focus();
      selectAll(nameEl);
    }

    /* Create a sub-node DOM element */
    function createSubNodeEl(name, jd) {
      const nodeEl = document.createElement('div');
      nodeEl.className = 'sub-node';
      nodeEl.innerHTML = `
        <div class="sub-header">
          <span class="drag-handle sub-drag" title="Drag to reorder">&#9776;</span>
          <span class="jd-num">${jd}</span>
          <span class="sub-name" contenteditable="true" spellcheck="false"
                onblur="markDirty()" onkeydown="handleNameKey(event)">${escHtml(name)}</span>
          <span class="sub-actions">
            <button class="add-child-btn" onclick="addChildSub(this)" title="Add child sub">+</button>
            <button class="delete-btn" onclick="deleteSub(this)" title="Remove">&times;</button>
          </span>
        </div>
        <div class="sub-children">
          <div class="sub-list" data-depth="0"></div>
        </div>`;
      return nodeEl;
    }

    /* Get the JD category number from a category element */
    function getCatJdId(catEl) {
      return parseInt(catEl.querySelector(':scope > .cat-header .jd-num').textContent.trim(), 10);
    }

    function selectAll(el) {
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    /* ─── Delete items ─── */
    function deleteArea(btn) {
      const areaEl = btn.closest('.area');
      const name = areaEl.querySelector('.area-name').textContent.trim();
      const catCount = areaEl.querySelectorAll('.category').length;
      const msg = catCount > 0
        ? 'Delete area "' + name + '" and its ' + catCount + ' categories?'
        : 'Delete area "' + name + '"?';
      if (!confirm(msg)) return;
      areaEl.remove();
      markDirty();
      renumberAll();
    }

    function deleteCategory(btn) {
      const catEl = btn.closest('.category');
      const name = catEl.querySelector('.cat-name').textContent.trim();
      if (!confirm('Delete category "' + name + '"?')) return;
      catEl.remove();
      markDirty();
      renumberAll();
    }

    function deleteSub(btn) {
      const subNode = btn.closest('.sub-node');
      const childCount = subNode.querySelectorAll('.sub-node').length; // all descendants
      const name = subNode.querySelector(':scope > .sub-header .sub-name').textContent.trim();
      if (childCount > 0) {
        if (!confirm('Delete "' + name + '" and its ' + childCount + ' descendants?')) return;
      }
      subNode.remove();
      markDirty();
      renumberAll();
    }

    /* ─── Renumber JD numbers recursively ─── */
    function renumberAll() {
      const areaEls = document.querySelectorAll('#area-list > .area');
      areaEls.forEach((areaEl, ai) => {
        const areaId = (ai + 1) * 10;
        areaEl.querySelector('.area-header .jd-num').textContent = areaId;
        const catEls = areaEl.querySelectorAll(':scope .category-list > .category');
        catEls.forEach((catEl, ci) => {
          const catId = areaId + ci + 1;
          catEl.querySelector(':scope > .cat-header .jd-num').textContent = catId;
          // Renumber subs recursively
          const subList = catEl.querySelector(':scope > .cat-body > .sub-list');
          renumberSubList(subList, catId, []);
        });
      });
    }

    function renumberSubList(subListEl, catId, parentIdChain) {
      if (!subListEl) return;
      const depth = parentIdChain.length;
      subListEl.setAttribute('data-depth', depth);
      const nodes = subListEl.querySelectorAll(':scope > .sub-node');
      nodes.forEach((nodeEl, i) => {
        const subId = i + 1;
        const idChain = parentIdChain.concat([subId]);
        const jd = jdNumber(catId, idChain);
        nodeEl.querySelector(':scope > .sub-header .jd-num').textContent = jd;
        // Recurse into children
        const childList = nodeEl.querySelector(':scope > .sub-children > .sub-list');
        renumberSubList(childList, catId, idChain);
      });
    }

    /* ─── SortableJS initialization ─── */
    function destroySortables() {
      sortableInstances.forEach(s => {
        try { s.destroy(); } catch(e) {}
      });
      sortableInstances = [];
    }

    function initSortables() {
      destroySortables();

      // Area-level sorting
      const areaContainer = document.getElementById('area-list');
      sortableInstances.push(new Sortable(areaContainer, {
        animation: 150,
        handle: '.area-drag',
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        dragClass: 'sortable-drag',
        onEnd: function() {
          renumberAll();
          markDirty();
        },
      }));

      // Category-level sorting (within and between areas)
      document.querySelectorAll('.category-list').forEach(catList => {
        sortableInstances.push(new Sortable(catList, {
          group: 'categories',
          animation: 150,
          handle: '.cat-drag',
          ghostClass: 'sortable-ghost',
          chosenClass: 'sortable-chosen',
          dragClass: 'sortable-drag',
          onEnd: function() {
            renumberAll();
            markDirty();
          },
        }));
      });

      // Sub-level sorting — all sub-lists at all depths
      document.querySelectorAll('.sub-list').forEach(subList => {
        initSubSortable(subList);
      });
    }

    function initSubSortable(subList) {
      // Avoid double-init: check if already managed
      if (subList._sortableInstance) return;
      const instance = new Sortable(subList, {
        group: 'subs',
        animation: 150,
        handle: '.sub-drag',
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        dragClass: 'sortable-drag',
        fallbackOnBody: true,
        swapThreshold: 0.65,
        onEnd: function() {
          renumberAll();
          markDirty();
        },
      });
      subList._sortableInstance = instance;
      sortableInstances.push(instance);
    }

    /* ─── Warn before leaving with unsaved changes ─── */
    window.addEventListener('beforeunload', function(e) {
      if (dirty) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    /* ─── Keyboard shortcut: Ctrl+S to save ─── */
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (dirty) saveTree();
      }
    });

    /* ─── Init ─── */
    loadTree();
  </script>
</body>
</html>
